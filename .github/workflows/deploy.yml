name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: listening-lab/package-lock.json

      - name: Install dependencies
        working-directory: listening-lab
        run: npm ci

      - name: Build
        working-directory: listening-lab
        run: npm run build

      - name: Copy audio files to dist
        working-directory: listening-lab
        run: |
          if [ -d "public/audio" ]; then
            cp -r public/audio dist/audio
          fi

      - name: Copy 404.html
        working-directory: listening-lab
        run: |
          if [ -f "public/404.html" ]; then
            cp public/404.html dist/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: listening-lab/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
